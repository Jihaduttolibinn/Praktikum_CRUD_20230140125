<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nama User - Praktikum 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
</head>
<body class="container mt-5">
<h2 class="mb-4">Daftar Pengguna</h2>

<div class="card mb-4">
    <div class="card-title" id="formTitle">Tambah User</h5>
        <form id="userForm">
            <input type="hidden" id="userId">
            <div class="row">
                <div class="col-md-5">
                    <label class="form-label">Nama</label>
                    <input type="text" id="userName" class="form-control" placeholder="Masukkan nama lengkap">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Umur</label>
                    <input type="number" id="userAge" class="form-control" placeholder="Masukkan umur">
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button type="submit" id="btnSubmit" class="btn btn-primary w-100">Simpan Data</button>
                    <button type="button" id="btnCancel" class="btn btn-secondary w-100" style="display:none;" onclick="resetForm()">Batal</button>
                </div>
            </div>
        </form>
    </div>

    <table class="table table-striped">
        <thead class="table-dark">
        <tr>
            <th>ID (Auto)</th>
            <th>Nama</th>
            <th>Umur</th>
            <th>Aksi</th>
        </tr>
        </thead>
        <tbody id="userTableBody">
        </tbody>
    </table>

    <script>
        const apiUrl = '/api/users';
        let isUpdate = false;

        $(document).ready(function() {
            loadUsers();

            $('#userForm').submit(function(e) {
                e.preventDefault();

                const userData = {
                    name: $('#userName').val(),
                    age: parseInt($('#userAge').val())
                };

                if (isUpdate) {
                    const id = $('#userId').val(); // Ambil ID dari hidden input
                    updateUser(id, userData);
                } else {
                    addUser(userData);
                }
            });
        });

        // 1. Ambil Semua Data (GET)
        function loadUsers() {
            $.ajax({
                url: apiUrl,
                method: 'GET',
                success: function(response) {
                    // Pastikan respon.data sesuai dengan struktur Map dan mengandung users
                    let rows = '';
                    $.each(response.data, function(index, user) {
                        rows += `<tr>
                            <td>${user.id}</td>
                            <td>${user.name}</td>
                            <td>${user.age}</td>
                            <td>
                                <button class="btn btn-warning btn-sm" onclick="editUser('${user.id}', '${user.name}', ${user.age})">Edit</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteUser('${user.id}')">Delete</button>
                            </td>
                        </tr>`;
                    });
                    $('#userTableBody').html(rows);
                }
            });
        }

        // 2. Tambah Data (POST)
        function addUser(data) {
            $.ajax({
                url: apiUrl,
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(data),
                success: function() {
                    resetForm();
                    loadUsers();
                },
                error: function() {
                    alert('Gagal menambah user.');
                }
            });
        }

        // 3. Update Data (PUT)
        function updateUser(id, data) {
            $.ajax({
                url: `${apiUrl}/${id}`,
                method: 'PUT',
                contentType: 'application/json',
                data: JSON.stringify(data),
                success: function() {
                    loadUsers();
                    resetForm();
                },
                error: function() {
                    alert('Gagal memperbarui user.');
                }
            });
        }

        // 4. Hapus Data (DELETE)
        function deleteUser(id) {
            if(confirm('Apakah Anda yakin menghapus user ini?')) {
                $.ajax({
                    url: `${apiUrl}/${id}`,
                    type: 'DELETE',
                    success: function() {
                        loadUsers();
                        alert('User telah dihapus.');
                    }
                });
            }
        }

        // Helpers: Masuk ke Mode Edit
        function editUser(id, name, age) {
            $('#userId').val(id);
            $('#userName').val(name);
            $('#userAge').val(age);
            $('#formTitle').text('Edit User');
            $('#btnSubmit').text('Update User').removeClass('btn-primary').addClass('btn-success');
            $('#btnCancel').show();
            isUpdate = true;
        }

        // Helpers: Reset Form ke Mode Tambah
        function resetForm() {
            $('#userId').val('');
            $('#userName').val('');
            $('#userAge').val('');
            $('#formTitle').text('Tambah User');
            $('#btnSubmit').text('Simpan Data').removeClass('btn-success').addClass('btn-primary');
            $('#btnCancel').hide();
            isUpdate = false;
        }
    </script>
    </body>
    </html>
